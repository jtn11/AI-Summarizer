<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extension Options</title>
</head>
<link rel="stylesheet" href="options.css">

<body class="options-container">
    <div class="options-card">
        <h1>AI Summary Settings</h1>

        <div class="form-group">
            <label for="api-key">Gemini API Key</label>
            <input type="text" id="api-key" placeholder="Enter your Gemmini API key">

            <p>
                You can get an API key from
                <a href="https://aistudio.google.com/app/apikey"> Google AI Studio</a>
            </p>
        </div>

        <button id="save-button">Save Settings</button>
        <p id="success-message">Settings saved successfully!</p>
    </div>
</body>
<script src="options.js"></script>

</html>
