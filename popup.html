<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Summariser</title>
</head>
<link rel="stylesheet" href="popup.css">

<body>
    <div class="heading" style="display: flex; justify-content: space-between; align-items: center;">
        <h1 style="margin: 0;">AI Summary</h1>
        <button id="settings-btn" style="cursor: pointer; background: none; border: none; font-size: 18px;" title="Settings">⚙️</button>
    </div>

    <div class="options">
        <div class="option-header">
            <select name="" id="summary-type">
                <option value="brief">Brief</option>
                <option value="detailed">Detailed</option>
                <option value="bullets">Bullet Points</option>
            </select>
            <div>
                <button id="summarize">Summarize</button>
                <button id="copy-btn">Copy</button>
            </div>
        </div>
    </div>

    <div class="SummarySection">
        <pre id="result">Select a type and click Summarize</pre>
    </div>

</body>
<script src="popup.js"></script>

</html>
